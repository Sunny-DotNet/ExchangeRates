name: update
on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Target
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: target

      - name: Clone Source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PROJECT_SOURCE_GIT_URL }}
          ref: master
          token: ${{ secrets.TOKEN }}
          path: source
          submodules: 'true'

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0

      - name: Execute Update
        run: |
          dotnet run --project source
          cd target
          git config --local user.email "m67186636@gmail.com"
          git config --local user.name "Sunny-DotNet"
          git diff --quiet && echo "No changes to commit" || git commit -a -m "Update All Exchange Rate"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          directory: target
